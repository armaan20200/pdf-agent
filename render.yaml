services:
  - type: web
    name: pdf-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: pdf-temp
      mountPath: /opt/render/project/src/temporary_files
      sizeGB: 1
